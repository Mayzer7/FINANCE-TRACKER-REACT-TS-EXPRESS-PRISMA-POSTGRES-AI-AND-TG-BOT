services:
  postgres:
    image: postgres:16-alpine
    container_name: aura-finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aura_finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aura_finance"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
